name: AssetVault CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. Test & Build Frontend
  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './frontend/package-lock.json'
      - name: Install dependencies
        working-directory: ./frontend
        run: npm install
      - name: Lint
        working-directory: ./frontend
        run: npm run lint
      - name: Build
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://assetvault-0fu0.onrender.com

  # 2. Test Backend
  backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'
      - name: Install dependencies
        working-directory: ./backend
        run: npm install

  # 3. Test & Build Contracts
  contracts:
    name: Test & Build Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.79.0
        with:
          targets: wasm32-unknown-unknown
      - name: Run Tests
        working-directory: ./contracts
        run: cargo test
      - name: Build Contracts
        working-directory: ./contracts
        run: cargo build --target wasm32-unknown-unknown --release
